name: Email Poller
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: cd poller && npm ci
      - name: Run poller
        run: node poller/scripts/poller.js --once
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          SITEWARE_AUTH_TOKEN: ${{ secrets.SITEWARE_AUTH_TOKEN }}
          DEFAULT_IMAP_PASSWORD: ${{ secrets.DEFAULT_IMAP_PASSWORD }}
          DEFAULT_SMTP_PASSWORD: ${{ secrets.DEFAULT_SMTP_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
